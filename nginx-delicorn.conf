server {
    server_name delicorn.in www.delicorn.in;

    # Frontend - Serve static files from dist
    root /var/www/Delicorn/frontend/dist;
    index index.html;

    # Increase upload size limits
    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API - WITH PUT/DELETE/PATCH SUPPORT
    location /api {
        # CRITICAL: Allow all HTTP methods
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Allow all methods
        proxy_method $request_method;
    }

    # Uploads - Serve uploaded files
    location /uploads {
        alias /var/www/Delicorn/be/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Enable directory listing for debugging (remove in production)
        # autoindex on;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/delicorn.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/delicorn.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name delicorn.in www.delicorn.in;

    if ($host = www.delicorn.in) {
        return 301 https://$host$request_uri;
    }

    if ($host = delicorn.in) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
